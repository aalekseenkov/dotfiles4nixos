###############################################################################
# LANGUAGE SERVER CONFIGURATION
# Helix Version: 25.07.1
###############################################################################

# Simple Completion Language Server
# Provides word-based completion from open buffers (mimics Vim's Ctrl-n/Ctrl-p)
[language-server.simple-completion-ls]
command = "simple-completion-language-server"
config = { feature_words = true, max_completion_items = 20 }

########
# YAML #
########
[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]
config = { yaml = { format = { enable = true }, validate = true, schemas = { "kubernetes" = "*.yaml" } } }

[[language]]
name = "yaml"
scope = "source.yaml"
file-types = ["yml", "yaml", "json"]
auto-format = true
language-servers = [
  { name = "yaml-language-server" },
  { name = "simple-completion-ls" },
]

###########
# ANSIBLE #
###########
[language-server.ansible-ls]
command = "ansible-language-server"
args = ["--stdio"]

[language-server.ansible-ls.config.ansible]
ansible.path = "ansible"
python.interpreterPath = "python3"
lint.enabled = false

[[language]]
name = "ansible"
scope = "source.ansible"
file-types = ["yml", "yaml"]
roots = [
  "ansible.cfg",
  ".ansible-lint",
  "roles",
  "inventory",
  "group_vars",
  "host_vars",
  "playbook.yml",
]
auto-format = true
language-servers = [{ name = "ansible-ls" }, { name = "simple-completion-ls" }]

########
# BASH #
########
[language-server.bash-ls]
command = "bash-language-server"
args = ["start"]

[[language]]
name = "bash"
scope = "source.bash"
file-types = ["sh", "bash"]
auto-format = true
language-servers = [{ name = "bash-ls" }, { name = "simple-completion-ls" }]

########
# TOML #
########
[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

[[language]]
name = "toml"
scope = "source.toml"
file-types = ["toml"]
auto-format = true
language-servers = [{ name = "taplo" }, { name = "simple-completion-ls" }]

#######
# NIX #
#######
[language-server.nil]
command = "nil"

[[language]]
name = "nix"
scope = "source.nix"
file-types = ["nix"]
auto-format = true
language-servers = [{ name = "nil" }, { name = "simple-completion-ls" }]

######
# GO #
######
[language-server.gopls]
command = "gopls"
config = { "ui.inlayhint.hints" = { "assignVariableTypes" = true, "compositeLiteralFields" = true, "compositeLiteralTypes" = true, "constantValues" = true, "functionTypeParameters" = true, "parameterNames" = true, "rangeVariableTypes" = true }, "ui.completion.usePlaceholders" = true, "formatting.gofumpt" = true }

[language-server.golangci-lint]
command = "golangci-lint-langserver"

[[language]]
name = "go"
scope = "source.go"
auto-format = true
formatter = { command = "goimports" }
language-servers = [
  { name = "gopls" },
  { name = "golangci-lint" },
  { name = "simple-completion-ls" },
]

[language.debugger]
name = "delve"
transport = "tcp"
command = "dlv"
args = ["dap", "--listen", "127.0.0.1:{{port}}"]

[[language.debugger.templates]]
name = "debug"
request = "launch"
completion = [{ name = "entrypoint", completion = "filename" }]
args = { mode = "debug", program = "{{entrypoint}}" }

###############################################################################
# INFRASTRUCTURE & SYSTEM ADMINISTRATION
###############################################################################

# Docker & Containers
[[language]]
name = "dockerfile"
scope = "source.dockerfile"
language-servers = [
  { name = "docker-langserver" },
  { name = "simple-completion-ls" },
]

# Terraform / HCL
[[language]]
name = "hcl"
scope = "source.hcl"
language-servers = [
  { name = "terraform-ls" },
  { name = "simple-completion-ls" },
]

# Plain Text & System Configs
[[language]]
name = "text"
scope = "source.txt"
file-types = [
  "txt",
  "log",
  "hosts",
  "resolv.conf",
  "authorized_keys",
  "README",
  "NOTES",
]
language-servers = [{ name = "simple-completion-ls" }]

# Documentation & Generic Configs
[[language]]
name = "markdown"
scope = "source.md"
language-servers = [{ name = "simple-completion-ls" }]

[[language]]
name = "ini"
scope = "source.ini"
language-servers = [{ name = "simple-completion-ls" }]
