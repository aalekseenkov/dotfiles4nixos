theme = "default"

[editor]
line-number = "relative"
cursorline = true
scrolloff = 5
scroll-lines = 3
color-modes = true
bufferline = "multiple"
idle-timeout = 0
true-color = true
rulers = [80, 100]
default-yank-register = '+'
auto-format = true
trim-trailing-whitespace = true

[editor.soft-wrap]
enable = true
wrap-indicator = " "
max-indent-retain = 40
wrap-at-text-width = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true

[editor.whitespace]
render = "all"

# or control each character
# [editor.whitespace.render]
# space = "all"
# tab = "all"
# nbsp = "none"
# nnbsp = "none"
# newline = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·"  # Tabs will look like "→···" (depending on tab width)

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = [
  "mode",
  "spacer",
  "spinner",
  "spacer",
  "file-name",
  "spacer",
  "file-modification-indicator",
]
center = ["version-control"]
right = [
  "diagnostics",
  "spacer",
  "selections",
  "position",
  "position-percentage",
  "spacer",
  "file-encoding",
  "file-type",
]
separator = "│"

[editor.file-picker]
hidden = false

[keys.normal]
"esc" = ["collapse_selection", "keep_primary_selection"]

# --- Navigation (hjkl) ---
"р" = "move_char_left"  # h
"о" = "move_line_down"  # j
"л" = "move_line_up"    # k
"д" = "move_char_right" # l

# --- Word Movement ---
"ц" = "move_next_word_start" # w
"и" = "move_prev_word_start" # b
"у" = "move_next_word_end"   # e

# --- Mode Entry ---
"ш" = "insert_mode"          # i
"Ш" = "insert_at_line_start" # I
"ф" = "append_mode"          # a
"Ф" = "insert_at_line_end"   # A
"с" = "change_selection"     # c
"м" = "select_mode"          # v
"в" = "delete_selection"     # d (Delete selection)

# --- Selection & Editing ---
"н" = "yank"              # y (Yank/Copy)
"з" = "paste_after"       # p
"З" = "paste_before"      # P
"х" = "extend_line_below" # x (Select line)
"щ" = "open_below"        # o
"Щ" = "open_above"        # O

# --- Search & History ---
"к" = "search_next" # n
"К" = "search_prev" # N
"г" = "undo"        # u
"Г" = "redo"        # U
"я" = "search"      # z (Search start)

# --- Command & Misc ---
"Ж" = "command_mode"       # :
"Ю" = "repeat_last_motion" # . (Maps to > or . depending on layout)

"п" = { "п" = "goto_line_start", "о" = "move_line_down", "л" = "move_line_up", "д" = "goto_line_end" }

[keys.normal."+"]
"r" = [":reload-all", ":lsp-restart", ":config-reload"]
