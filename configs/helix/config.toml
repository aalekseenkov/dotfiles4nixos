theme = "default"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
bufferline = "multiple"
idle-timeout = 0
true-color = true
rulers = [80, 100]
default-yank-register = '+'

trim-trailing-whitespace = true
auto-format = true

whitespace.render = "all"
whitespace.characters.space = "."
whitespace.characters.tab = ">"
whitespace.characters.newline = "$"
# whitespace.characters.trailing = "#"

gutters = ["diff", "diagnostics", "line-numbers", "spacer"]

[editor.cursor-shape]
# Здесь секция допустима
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
# Added "spacer" and "spinner" for a professional look
left = ["mode", "spacer", "spinner", "spacer", "file-name", "spacer", "file-modification-indicator"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]
separator = "│"

[editor.file-picker]
hidden = false

[keys.normal]
"esc" = ["collapse_selection", "keep_primary_selection"]
