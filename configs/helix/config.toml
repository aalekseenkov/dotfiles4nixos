theme = "default"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
bufferline = "multiple"
auto-format = true
idle-timeout = 0
true-color = true
# Added "spacer" at the end to prevent text sticking to numbers
gutters = ["diff", "diagnostics", "line-numbers", "spacer"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.whitespace]
render = "all"

[editor.whitespace.characters]
space = " "
newline = " "
tab = "→"      # Only TAB is visible
trailing = "·" # Only trailing spaces are visible

[editor.statusline]
# Added "spacer" and "spinner" for a professional look
left = ["mode", "spacer", "spinner", "spacer", "file-name", "spacer", "file-modification-indicator"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]
separator = "│"

[editor.file-picker]
hidden = false

[keys.normal]
"esc" = ["collapse_selection", "keep_primary_selection"]
