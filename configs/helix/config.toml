theme = "default"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
bufferline = "multiple"
auto-format = true
idle-timeout = 0
true-color = true
trim-trailing-whitespace = true

# Вот правильное место для gutters в стабильной версии:
gutters = ["diff", "diagnostics", "line-numbers"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "╎"
skip-cols = 1

[editor.whitespace]
render = "trailing"

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = ["diagnostics"]
right = ["selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"

[editor.file-picker]
hidden = false

[keys.normal]
"esc" = ["collapse_selection", "keep_primary_selection"]
