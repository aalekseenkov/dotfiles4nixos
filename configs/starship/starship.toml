# Get editor-friendly prompts
format = """
[в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ](bold green)
[в”Ӯ](bold green) $directory$git_branch$git_status
[в””в”Җ](bold green) $character"""

# Disable modules that cause "Permission denied" or slowness
[package]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[aws]
disabled = true

[directory]
style = "bold cyan"
truncate_to_repo = true
truncation_symbol = "вҖҰ/"

[git_branch]
symbol = "рҹҢұ "
style = "bold green"

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[character]
success_symbol = "[О»](bold green)"
error_symbol = "[О»](bold red)"

