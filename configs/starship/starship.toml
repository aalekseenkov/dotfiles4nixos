# Get editor-friendly prompts
format = """
[в”Ңв”Җ](green)$env_var[в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ](green)
[в”Ӯ ](green) $directory$git_branch$git_status
[в””в”Җ](green) $character"""

[env_var.ZELLIJ]
variable = "ZELLIJ"
format = "[ $symbol ]($style)"
symbol = "zellij"
style = "green"

# Disable modules that cause "Permission denied" or slowness
[package]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[aws]
disabled = true

[directory]
style = "cyan"
truncate_to_repo = true
truncation_symbol = "вҖҰ/"

[git_branch]
symbol = "рҹҢұ "
style = "green"

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[character]
success_symbol = "[гҖү](green)"
error_symbol = "[гҖү](red)"

vimcmd_symbol = "[гҖҲ](yellow)"
vimcmd_replace_one_symbol = "[гҖҲ](purple)"
vimcmd_replace_symbol = "[гҖҲ](purple)"
vimcmd_visual_symbol = "[гҖҲ](lavender)"

