# Get editor-friendly prompts
format = """
[┌─](green)$env_var$fill$time[── ](green)
[│ ](green) $directory$git_branch$git_status
[└─](green) $character"""

[fill]
symbol = "─"
style = "green"

[time]
disabled = false
format = "[ $time ]($style)"
time_format = "%H:%M"
style = "green"

[env_var.ZELLIJ]
variable = "ZELLIJ"
format = "[ $symbol ]($style)"
symbol = "zellij"
style = "green"

# Disable modules that cause "Permission denied" or slowness
[package]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[aws]
disabled = true

[directory]
style = "cyan"
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = "🌱 "
style = "green"

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[character]
success_symbol = "[〉](green)"
error_symbol = "[〉](red)"

vimcmd_symbol = "[〈](yellow)"
vimcmd_replace_one_symbol = "[〈](purple)"
vimcmd_replace_symbol = "[〈](purple)"
vimcmd_visual_symbol = "[〈](lavender)"
